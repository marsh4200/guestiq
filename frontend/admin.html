<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GuestIQ · Admin</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <!-- LOGIN -->
  <div class="login-screen" id="loginScreen">
    <div class="card login-card">
      <div class="brand" style="margin-bottom:6px;">Guest<span>IQ</span></div>
      <p class="muted" style="margin-top:0;font-size:13px;">Hotel reception console</p>
      <label>Password</label>
      <input id="loginPw" type="password" placeholder="Admin password" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="btn" style="width:100%;margin-top:14px;" onclick="doLogin()">Sign in</button>
      <p class="muted" id="loginErr" style="color:var(--red);font-size:13px;min-height:18px;"></p>
    </div>
  </div>

  <!-- APP -->
  <div id="app" class="hidden">
    <div class="topbar">
      <div class="brand">Guest<span>IQ</span></div>
      <span class="badge-ver" id="verBadge">v—</span>
      <div class="spacer"></div>
      <button class="btn ghost sm" id="updateBtn" onclick="switchTab('updates')"></button>
      <button class="btn ghost sm" onclick="doLogout()">Sign out</button>
    </div>

    <div class="tabs" id="tabs">
      <button class="tab active" data-tab="checkins" onclick="switchTab('checkins')">Check-ins</button>
      <button class="tab" data-tab="rooms" onclick="switchTab('rooms')">Rooms</button>
      <button class="tab" data-tab="guests" onclick="switchTab('guests')">Guests</button>
      <button class="tab" data-tab="qr" onclick="switchTab('qr')">QR Codes</button>
      <button class="tab" data-tab="automation" onclick="switchTab('automation')">Automation</button>
      <button class="tab" data-tab="settings" onclick="switchTab('settings')">Settings</button>
      <button class="tab" data-tab="updates" onclick="switchTab('updates')">Updates</button>
    </div>

    <div class="wrap">
      <div id="tab-checkins"></div>
      <div id="tab-rooms" class="hidden"></div>
      <div id="tab-guests" class="hidden"></div>
      <div id="tab-qr" class="hidden"></div>
      <div id="tab-automation" class="hidden"></div>
      <div id="tab-settings" class="hidden"></div>
      <div id="tab-updates" class="hidden"></div>
    </div>
  </div>

  <div id="modalRoot"></div>
  <div id="toastRoot"></div>

  <script src="/static/js/admin.js?v=1.1.1"></script>
</body>
</html>
